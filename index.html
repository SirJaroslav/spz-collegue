<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hledání SPZ</title>
<style>
   body {
       margin: 0;
       font-family: Arial, sans-serif;
       background: #ffffff;
       display: flex;
       justify-content: center;
       align-items: center;
       height: 100vh;
   }
   .container {
       text-align: center;
   }
   input {
       padding: 15px;
       font-size: 20px;
       width: 250px;
       text-align: center;
       margin-bottom: 15px;
       border: 2px solid #ccc;
       border-radius: 10px;
   }
   button {
       padding: 12px 25px;
       font-size: 18px;
       border: none;
       border-radius: 10px;
       background: #007AFF;
       color: white;
       cursor: pointer;
   }
   button:hover {
       background: #005FCC;
   }
   .result {
       margin-top: 20px;
       font-size: 30px;
       font-weight: bold;
   }
</style>
</head>
<body>
<div class="container">
<input type="text" id="spzInput" placeholder="Zadej SPZ">
<br>
<button onclick="hledat()">Hledat</button>
<div class="result" id="vysledek"></div>
</div>
<script>

`.toUpperCase().split(/\s+/);
// 🔍 Funkce hledání
function hledat() {
   let input = document.getElementById("spzInput").value.toUpperCase().trim();
   let vysledek = document.getElementById("vysledek");
   if (!input) {
       vysledek.textContent = "Zadej SPZ";
       vysledek.style.color = "black";
       return;
   }
   if (seznamSPZ.includes(input)) {
       vysledek.textContent = "ANO: " + input;
       vysledek.style.color = "green";
   } else {
       vysledek.textContent = "NE: " + input;
       vysledek.style.color = "red";
   }
}
</script>
