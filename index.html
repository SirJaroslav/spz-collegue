<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hledání SPZ</title>
<style>
   body {
       margin: 0;
       font-family: Arial, sans-serif;
       background: #ffffff;
       display: flex;
       justify-content: center;
       align-items: center;
       height: 100vh;
   }
   .container {
       text-align: center;
   }
   input {
       padding: 15px;
       font-size: 20px;
       width: 250px;
       text-align: center;
       margin-bottom: 15px;
       border: 2px solid #ccc;
       border-radius: 10px;
   }
   button {
       padding: 12px 25px;
       font-size: 18px;
       border: none;
       border-radius: 10px;
       background: #007AFF;
       color: white;
       cursor: pointer;
   }
   button:hover {
       background: #005FCC;
   }
   .result {
       margin-top: 20px;
       font-size: 30px;
       font-weight: bold;
   }
</style>
</head>
<body>
<div class="container">
<input type="text" id="spzInput" placeholder="Zadej SPZ">
<br>
<button onclick="hledat()">Hledat</button>
<div class="result" id="vysledek"></div>
</div>
<script>
// 🔹 SEM SI NAPIŠ SVŮJ SEZNAM SPZ
const seznamSPZ = `
2BR2993
4C39960
1BS5024
1BP5002
2BY2079
7B58909
3BK3844
3BH4121
3BD7467
3BD3164
AI2131II
1BP1462
3BD7000
6E62160
6E02291
2BU9843
2BJ3667
7J2622
EL228CL
9B53562
2BA4841
1BF5795
2B54734
1BY7412
1AEJ233
1BR1428
1BL4891
9B93148
9B97880
9A90588
8C11707
3BI0816
2BE0984
5AD5076
1BE6751
1UM2986
6J77611
4AE2595
`.toUpperCase().split(/\s+/);
// 🔍 Funkce hledání
function hledat() {
   let input = document.getElementById("spzInput").value.toUpperCase().trim();
   let vysledek = document.getElementById("vysledek");
   if (!input) {
       vysledek.textContent = "Zadej SPZ";
       vysledek.style.color = "black";
       return;
   }
   if (seznamSPZ.includes(input)) {
       vysledek.textContent = "ANO";
       vysledek.style.color = "green";
   } else {
       vysledek.textContent = "NE";
       vysledek.style.color = "red";
   }
}
</script>
</body>
</html>
